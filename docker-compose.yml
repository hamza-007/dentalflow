services:
  postgres:
    # pgvector image = postgres:16 + the `vector` extension (V2 Prosthesis Studio).
    image: pgvector/pgvector:pg16
    container_name: dentalflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-dentalflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-dentalflow}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-dentalflow} -d ${POSTGRES_DB:-dentalflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: dentalflow-api
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      # Inside the compose network the DB host is the service name "postgres".
      DATABASE_URL: postgres://${POSTGRES_USER:-dentalflow}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-dentalflow}?sslmode=disable
      API_PORT: "8080"
      API_ENV: ${API_ENV:-development}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000}
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET:-dev-access-secret-change-me}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev-refresh-secret-change-me}
      UPLOAD_DIR: /app/uploads
      # Set to "true" to auto-seed demo data on boot (idempotent).
      SEED_ON_START: ${SEED_ON_START:-false}
      SEED_KB_ON_START: ${SEED_KB_ON_START:-false}
    ports:
      - "${API_PORT:-8080}:8080"
    volumes:
      - uploads_data:/app/uploads

volumes:
  postgres_data:
  uploads_data:
